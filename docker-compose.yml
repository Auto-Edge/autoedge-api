version: '3.8'
services:
  # 1. The PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: autoedgeuser
      POSTGRES_PASSWORD: autoedgetest1234
      POSTGRES_DB: autoedge_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data # This saves your data so it isn't deleted when you restart

  # 2. The Redis Queue / Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata: